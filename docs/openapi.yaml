openapi: 3.0.3
info:
  title: EGG OS API v0.2
  version: 0.2.0
  description: 'Internal operating system API for Easy Going Group. This starter OpenAPI file compiles the API specification
    modules: Auth, RBAC, Core, Master Data, Inventory, ODR, Approval, Evidence, Audit, Export, Dashboard, Procurement, Complaints,
    Void/Refund, Correction, Automation, Integration, and System.'
  contact:
    name: EGG OS Technical Owner
    email: juniansyahilham1@gmail.com
servers:
- url: http://localhost:8787/api/v1
  description: Local Development
- url: https://staging-api.eggos.id/api/v1
  description: Staging
- url: https://api.eggos.id/api/v1
  description: Production
tags:
- name: Auth
  description: Authentication and session management
- name: Users
  description: User management
- name: RBAC
  description: Role, permission, and access scope management
- name: Core
  description: Company, brand, outlet, and department
- name: Master Data
  description: Items, aliases, units, categories, vendors, and master data requests
- name: Inventory
  description: Current stock, stock movement, opname, waste, emergency use, and transfer
- name: Daily Reports
  description: Opening, closing, shift, issue, and operational reports
- name: Approvals
  description: Centralized approval workflow
- name: Evidence
  description: Evidence upload, signed URL, replacement, and archive
- name: Audit
  description: Audit logs, audit flags, and review notes
- name: Exports
  description: Export jobs, report types, and downloadable reports
- name: Dashboard
  description: Dashboard overview, widgets, alerts, metrics, and tasks
- name: Procurement
  description: Purchase requests, receipts, and stock-in from purchase
- name: Complaints
  description: Customer complaint and follow-up management
- name: Void Refund
  description: Pawoon void/refund reference and audit control
- name: Corrections
  description: Correction request flow for final or locked records
- name: Automation
  description: n8n automation, notifications, webhook events, and queue
- name: Integrations
  description: Pawoon, n8n, storage, email, imports, sync, and webhook integrations
- name: System
  description: Settings, feature flags, health, cache, version, and maintenance
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PathIdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    CursorParam:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        nullable: true
    SearchParam:
      name: search
      in: query
      required: false
      schema:
        type: string
        nullable: true
    DateFromParam:
      name: date_from
      in: query
      required: false
      schema:
        type: string
        format: date
        nullable: true
    DateToParam:
      name: date_to
      in: query
      required: false
      schema:
        type: string
        format: date
        nullable: true
    OutletIdParam:
      name: outlet_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
        nullable: true
    BrandIdParam:
      name: brand_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
        nullable: true
    DepartmentIdParam:
      name: department_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
        nullable: true
  responses:
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflict or invalid state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    StandardSuccessResponse:
      type: object
      additionalProperties: true
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        meta:
          type: object
          nullable: true
          additionalProperties: true
    Pagination:
      type: object
      additionalProperties: false
      properties:
        limit:
          type: integer
          example: 20
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
          example: false
    StandardListResponse:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        pagination:
          $ref: '#/components/schemas/Pagination'
    ErrorDetail:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          nullable: true
        message:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          additionalProperties: false
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
            details:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'
              nullable: true
            request_id:
              type: string
              nullable: true
    UserSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
    ReasonRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
      required:
      - reason
    WorkflowNotesRequest:
      type: object
      additionalProperties: false
      properties:
        notes:
          type: string
          nullable: true
    SignedUrlResponse:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: false
          properties:
            download_url:
              type: string
              format: uri
            expires_in:
              type: integer
              example: 300
